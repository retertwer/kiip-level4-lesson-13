    <script>
        class SmartAudioPlayer {
            constructor() {
                this.currentAudio = null;
                this.isPlaying = false;
                this.webUtterance = null;
            }

            speak(text, lang = 'ko-KR') {
                this.stop();
                
                // Try Google TTS First
                const googleTtsUrl = `https://translate.google.com/translate_tts?ie=UTF-8&tl=${lang}&client=tw-ob&q=${encodeURIComponent(text)}`;
                this.currentAudio = new Audio(googleTtsUrl);
                
                this.currentAudio.play()
                    .then(() => {
                        this.isPlaying = true;
                        this.updateSpeakerUI(true);
                        this.currentAudio.onended = () => this.handleAudioEnded();
                    })
                    .catch((err) => {
                        console.warn("Google TTS failed, falling back to Web Speech API", err);
                        this.speakFallback(text, lang);
                    });
            }

            speakFallback(text, lang) {
                if (!('speechSynthesis' in window)) {
                    alert("ឧបករណ៍របស់អ្នកមិនគាំទ្រប្រព័ន្ធអានសំឡេងឡើយ។");
                    return;
                }
                window.speechSynthesis.cancel();
                this.webUtterance = new SpeechSynthesisUtterance(text);
                this.webUtterance.lang = lang;
                
                this.webUtterance.onstart = () => {
                    this.isPlaying = true;
                    this.updateSpeakerUI(true);
                };
                this.webUtterance.onend = () => this.handleAudioEnded();
                this.webUtterance.onerror = () => this.handleAudioEnded();
                
                window.speechSynthesis.speak(this.webUtterance);
            }

            stop() {
                if (this.currentAudio) {
                    this.currentAudio.pause();
                    this.currentAudio = null;
                }
                if ('speechSynthesis' in window) {
                    window.speechSynthesis.cancel();
                }
                this.isPlaying = false;
                this.updateSpeakerUI(false);
            }

            handleAudioEnded() {
                this.isPlaying = false;
                this.updateSpeakerUI(false);
            }

            updateSpeakerUI(playing) {
                const icon = document.getElementById('speaker-icon');
                if (icon) {
                    if (playing) {
                        icon.className = 'fa-solid fa-circle-pause text-amber-400 text-xl animate-pulse';
                    } else {
                        icon.className = 'fa-solid fa-volume-high text-amber-400 text-xl';
                    }
                }
            }

            togglePlay(text, lang) {
                if (this.isPlaying) {
                    this.stop();
                } else {
                    this.speak(text, lang);
                }
            }
        }

        const audioPlayer = new SmartAudioPlayer();
    </script>

        class QuizManager {
            constructor(questions) {
                this.questions = questions;
                this.currentIndex = 0;
                this.userAnswers = new Array(questions.length).fill(null);
                this.score = 0;
                this.isAnswered = false;
                
                // Hint features flags
                this.showHintQ = false;
                this.showHintA = false;
                this.eliminatedIndices = [];
                
                // Review mode flag
                this.isReviewMode = false;
            }

            init() {
                this.currentIndex = 0;
                this.score = 0;
                this.isAnswered = false;
                this.isReviewMode = false;
                this.userAnswers.fill(null);
                this.resetHints();
                this.renderQuestion();
                
                // Show hint elements
                document.getElementById('btn-hint-q').style.display = 'inline-flex';
                document.getElementById('btn-hint-50').style.display = 'inline-flex';
                document.getElementById('btn-hint-a').style.display = 'inline-flex';
            }

            resetHints() {
                this.showHintQ = false;
                this.showHintA = false;
                this.eliminatedIndices = [];
                
                // Reset UI active button states
                document.getElementById('btn-hint-q').classList.remove('bg-amber-500', 'text-slate-950');
                document.getElementById('btn-hint-q').classList.add('bg-slate-800', 'text-slate-300');
                document.getElementById('btn-hint-a').classList.remove('bg-amber-500', 'text-slate-950');
                document.getElementById('btn-hint-a').classList.add('bg-slate-800', 'text-slate-300');
                document.getElementById('btn-hint-50').classList.remove('opacity-50', 'cursor-not-allowed');
                document.getElementById('btn-hint-50').disabled = false;
            }

            renderQuestion() {
                audioPlayer.stop();
                const q = this.questions[this.currentIndex];
                this.isAnswered = this.userAnswers[this.currentIndex] !== null;

                // Updates Header Info
                document.getElementById('badge-part').innerText = q.part;
                document.getElementById('progress-text').innerText = `${this.currentIndex + 1} / ${this.questions.length}`;
                const pct = ((this.currentIndex + 1) / this.questions.length) * 100;
                document.getElementById('progress-bar').style.width = `${pct}%`;

                // Main Layout Dynamic Formulation
                let html = `
                    <div class="flex justify-between items-start gap-4 mb-4">
                        <span class="bg-amber-500 text-slate-950 text-xs font-bold px-2 py-0.5 rounded-md">សំណួរទី ${q.id}</span>
                        <button onclick="audioPlayer.togglePlay(quizQuestions[${this.currentIndex}].questionKo, 'ko-KR')" class="w-10 h-10 rounded-full bg-amber-500/10 hover:bg-amber-500/20 text-amber-400 flex items-center justify-center transition border border-amber-500/20" title="ស្តាប់សំឡេង">
                            <i id="speaker-icon" class="fa-solid fa-volume-high text-base text-amber-400"></i>
                        </button>
                    </div>

                    <div class="text-lg md:text-xl font-medium text-slate-100 whitespace-pre-line mb-2" id="text-ko-q">${q.ko || q.questionKo}</div>
                `;

                // Hint Question Display Toggle
                if (this.showHintQ || this.isAnswered || this.isReviewMode) {
                    html += `
                        <div class="text-xs text-slate-400 italic mb-2 border-l-2 border-amber-500/50 pl-2">🗣️ ${q.questionRead}</div>
                        <div class="text-sm text-slate-300 font-medium mb-4 bg-slate-900/40 p-3 rounded-lg border border-slate-800/80">${q.questionKm}</div>
                    `;
                }

                html += `<div class="space-y-3 mt-4" id="options-block">`;

                q.options.forEach((opt, idx) => {
                    const isSelected = this.userAnswers[this.currentIndex] === idx;
                    const isCorrect = idx === q.correctIndex;
                    let optClass = "w-full text-left custom-card border border-slate-800 rounded-xl p-4 transition-all duration-200 flex flex-col gap-1 cursor-pointer hover:border-slate-600 active:scale-[0.99]";
                    
                    if (this.eliminatedIndices.includes(idx)) {
                        optClass += " opacity-25 pointer-events-none border-dashed";
                    }

                    if (this.isAnswered || this.isReviewMode) {
                        if (isCorrect) {
                            optClass += " bg-emerald-500/10 border-emerald-500 text-emerald-400 font-medium";
                        } else if (isSelected) {
                            optClass += " bg-rose-500/10 border-rose-500 text-rose-400";
                        } else {
                            optClass += " opacity-50 border-slate-800";
                        }
                    } else {
                        if (isSelected) {
                            optClass += " border-amber-500 bg-amber-500/5 text-amber-400";
                        }
                    }

                    html += `
                        <button onclick="quizManager.selectOption(${idx})" class="${optClass}" ${this.isAnswered || this.isReviewMode ? 'disabled' : ''}>
                            <div class="flex items-center gap-3">
                                <span class="w-6 h-6 rounded-md flex items-center justify-center font-bold text-xs ${isSelected ? 'bg-amber-500 text-slate-900' : 'bg-slate-800 text-slate-400'}">${idx + 1}</span>
                                <span class="font-medium text-sm md:text-base">${opt.text}</span>
                            </div>
                    `;

                    if (this.showHintA || this.isAnswered || this.isReviewMode) {
                        html += `<span class="text-xs ${isCorrect ? 'text-emerald-400/80' : isSelected ? 'text-rose-400/80' : 'text-slate-400'} ml-9 border-t border-slate-800/50 pt-1 mt-0.5">${opt.km}</span>`;
                    }

                    html += `</button>`;
                });

                html += `</div>`;

                // Visual Feedback Reveal Box
                if (this.isAnswered || this.isReviewMode) {
                    html += `
                        <div class="mt-6 border-t border-slate-800 pt-5 space-y-4 animate-fadeIn">
                            <div class="bg-slate-900/60 rounded-xl p-4 border border-slate-800">
                                <h4 class="text-sm font-bold text-amber-400 mb-1.5 flex items-center gap-1.5">
                                    <i class="fa-solid fa-circle-info"></i> ការពន្យល់លម្អិត (Explanation)
                                </h4>
                                <p class="text-slate-300 text-xs md:text-sm leading-relaxed">${q.explanation}</p>
                            </div>

                            <div>
                                <h4 class="text-sm font-bold text-slate-300 mb-2 flex items-center gap-1.5">
                                    <i class="fa-solid fa-book-open text-xs"></i> ពាក្យសព្ទគន្លឹះ (Vocabulary Breakdown)
                                </h4>
                                <div class="grid grid-cols-1 sm:grid-cols-2 gap-2">
                    `;
                    q.vocabBreakdown.forEach(v => {
                        html += `
                            <div class="bg-slate-900/30 border border-slate-800/60 rounded-lg px-3 py-2 flex justify-between items-center text-xs">
                                <span class="font-medium text-amber-300">${v.word}</span>
                                <span class="text-slate-400">${v.mean}</span>
                            </div>
                        `;
                    });
                    html += `
                                </div>
                            </div>
                        </div>
                    `;
                }

                document.getElementById('quiz-container').innerHTML = html;
                this.updateNextButton();
            }

            selectOption(idx) {
                if (this.isAnswered || this.isReviewMode) return;
                this.userAnswers[this.currentIndex] = idx;
                this.isAnswered = true;

                if (idx === this.questions[this.currentIndex].correctIndex) {
                    this.score++;
                }
                this.renderQuestion();
            }

            toggleHintQuestion() {
                this.showHintQ = !this.showHintQ;
                const btn = document.getElementById('btn-hint-q');
                if (this.showHintQ) {
                    btn.classList.replace('bg-slate-800', 'bg-amber-500');
                    btn.classList.replace('text-slate-300', 'text-slate-950');
                } else {
                    btn.classList.replace('bg-amber-500', 'bg-slate-800');
                    btn.classList.replace('text-slate-950', 'text-slate-300');
                }
                this.renderQuestion();
            }

            toggleHintAnswers() {
                this.showHintA = !this.showHintA;
                const btn = document.getElementById('btn-hint-a');
                if (this.showHintA) {
                    btn.classList.replace('bg-slate-800', 'bg-amber-500');
                    btn.classList.replace('text-slate-300', 'text-slate-950');
                } else {
                    btn.classList.replace('bg-amber-500', 'bg-slate-800');
                    btn.classList.replace('text-slate-950', 'text-slate-300');
                }
                this.renderQuestion();
            }

            trigger5050() {
                if (this.isAnswered || this.isReviewMode) return;
                const q = this.questions[this.currentIndex];
                const correct = q.correctIndex;
                let wrongIndices = [];
                for (let i = 0; i < 4; i++) {
                    if (i !== correct) wrongIndices.push(i);
                }
                // Shuffle and eliminate 2 wrong options
                wrongIndices.sort(() => Math.random() - 0.5);
                this.eliminatedIndices = [wrongIndices[0], wrongIndices[1]];

                const btn = document.getElementById('btn-hint-50');
                btn.classList.add('opacity-50', 'cursor-not-allowed');
                btn.disabled = true;

                this.renderQuestion();
            }

            updateNextButton() {
                const btn = document.getElementById('btn-next');
                if (this.isAnswered || this.isReviewMode) {
                    btn.classList.remove('opacity-50', 'cursor-not-allowed');
                    btn.classList.add('hover:bg-amber-400');
                    btn.disabled = false;
                    if (this.currentIndex === this.questions.length - 1 && !this.isReviewMode) {
                        btn.innerHTML = `មើលលទ្ធផល <i class="fa-solid fa-square-poll-vertical"></i>`;
                    } else {
                        btn.innerHTML = `បន្ទាប់ <i class="fa-solid fa-chevron-right"></i>`;
                    }
                } else {
                    btn.classList.add('opacity-50', 'cursor-not-allowed');
                    btn.classList.remove('hover:bg-amber-400');
                    btn.disabled = true;
                    btn.innerHTML = `បន្ទាប់ <i class="fa-solid fa-chevron-right"></i>`;
                }
            }

            nextQuestion() {
                if (!this.isAnswered && !this.isReviewMode) return;

                if (this.isReviewMode) {
                    if (this.currentIndex < this.questions.length - 1) {
                        this.currentIndex++;
                        this.renderQuestion();
                    } else {
                        this.showResultsScreen();
                    }
                    return;
                }

                if (this.currentIndex < this.questions.length - 1) {
                    this.currentIndex++;
                    this.resetHints();
                    this.renderQuestion();
                } else {
                    this.showResultsScreen();
                }
            }

            showResultsScreen() {
                audioPlayer.stop();
                // Hide helper hints triggers
                document.getElementById('btn-hint-q').style.display = 'none';
                document.getElementById('btn-hint-50').style.display = 'none';
                document.getElementById('btn-hint-a').style.display = 'none';

                const nextBtn = document.getElementById('btn-next');
                nextBtn.innerHTML = `ធ្វើឡើងវិញ <i class="fa-solid fa-rotate-right"></i>`;
                nextBtn.onclick = () => quizManager.init();

                const percent = Math.round((this.score / this.questions.length) * 100);
                let passBadge = percent >= 60 
                    ? `<span class="bg-emerald-500/10 text-emerald-400 border border-emerald-500/20 px-3 py-1 rounded-full font-bold text-sm">ជាប់ (PASSED)</span>`
                    : `<span class="bg-rose-500/10 text-rose-400 border border-rose-500/20 px-3 py-1 rounded-full font-bold text-sm">ធ្លាក់ (FAILED)</span>`;

                let html = `
                    <div class="text-center py-6 animate-fadeIn">
                        <div class="w-24 h-24 rounded-full bg-amber-500/10 text-amber-400 flex items-center justify-center mx-auto mb-4 border-2 border-amber-500/20 shadow-lg">
                            <i class="fa-solid fa-trophy text-4xl"></i>
                        </div>
                        <h2 class="text-2xl font-bold text-slate-100 mb-1">បញ្ចប់ការធ្វើតេស្ត!</h2>
                        <p class="text-slate-400 text-sm mb-4">កម្រិត ៤ មេរៀនទី ១៣ - 환경 보호</p>
                        
                        <div class="my-3">${passBadge}</div>

                        <div class="bg-slate-900/60 max-w-sm mx-auto rounded-2xl p-5 border border-slate-800 space-y-3 mt-6">
                            <div class="flex justify-between items-center text-sm border-b border-slate-800/60 pb-2">
                                <span class="text-slate-400">ពិន្ទុទទួលបាន (Score):</span>
                                <span class="text-amber-400 font-bold text-lg">${this.score} / ${this.questions.length}</span>
                            </div>
                            <div class="flex justify-between items-center text-sm">
                                <span class="text-slate-400">ភាគរយសមត្ថភាព (Percentage):</span>
                                <span class="text-slate-200 font-bold">${percent}%</span>
                            </div>
                        </div>

                        <div class="mt-8 flex flex-col sm:flex-row gap-3 justify-center max-w-sm mx-auto">
                            <button onclick="quizManager.startReviewMode()" class="w-full bg-slate-800 border border-slate-700 text-slate-200 hover:text-white py-3 px-4 rounded-xl font-bold text-sm transition active:scale-95 flex items-center justify-center gap-2 shadow-md">
                                <i class="fa-solid fa-magnifying-glass-chart"></i> ឆែកមើលចម្លើយឡើងវិញ
                            </button>
                        </div>
                    </div>
                `;
                document.getElementById('quiz-container').innerHTML = html;
                document.getElementById('progress-bar').style.width = '100%';
                document.getElementById('progress-text').innerText = "លទ្ធផល";
            }

            startReviewMode() {
                this.isReviewMode = true;
                this.currentIndex = 0;
                
                document.getElementById('btn-hint-q').style.display = 'none';
                document.getElementById('btn-hint-50').style.display = 'none';
                document.getElementById('btn-hint-a').style.display = 'none';
                
                const nextBtn = document.getElementById('btn-next');
                nextBtn.onclick = () => this.nextQuestion();
                
                this.renderQuestion();
            }

            goBack() {
                if(confirm("តើអ្នកចង់ចាកចេញពីការប្រឡងនេះមែនទេ?")) {
                    alert("ប្រព័ន្ធនឹងបញ្ជូនត្រឡប់ទៅទំព័រដើមមេរៀនស្វ័យប្រវត្ត។");
                }
            }
        }

        const quizManager = new QuizManager(quizQuestions);
        window.onload = () => quizManager.init();
    </script>
</body>
</html>
